<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="showTab(event, 'news-section')">NEWS</button>
        <button id="chat-tab-btn" class="tab-btn" onclick="showTab(event, 'chat-section')" style="display:none;">CHAT</button>
        <button class="tab-btn" onclick="showTab(event, 'info-section')">INFO</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login main-access-btn" onclick="openAuthModal()">ACCESS</button>
    </div>
</header>

<main>
    <div id="initial-loader" class="initial-overlay">
        <h1 class="giant-welcome">WELCOME</h1>
    </div>

    
    <section id="news-section" class="content-section" style="display: block;">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="info-section" class="content-section" style="display: none;">
        <div class="card">
            <h3>SYSTEM INFORMATION</h3>
            <p class="status-online">Status: ONLINE</p>
            <p>Welcome to KILLA node. All data encrypted.</p>
        </div>
    </section>

    <section id="chat-section" class="content-section" style="display: none;">
    <div id="chat-messages" class="chat-box"></div>
    </section>

    <div id="user-profile-modal" class="modal-overlay" style="display:none;" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="profile-header">
            <img id="view-avatar" src="" class="avatar-large">
            <h2 id="view-name">---</h2>
            <span id="view-role" class="role-badge">---</span>
        </div>
        <div class="profile-stats">
            <p>ID: <span id="view-id">---</span></p>
        </div>
        <button id="follow-btn" class="auth-submit">FOLLOW</button>
    </div>
</div>

    <section id="cabinet-section" class="content-section" style="display: none;">
        <div class="card profile-card">
            <h1>PROFILE CONFIG</h1>
            <div class="profile-main-info">
                <img id="user-avatar-display" src="" class="avatar-current" alt="AV">
                <div class="profile-text-info">
                    <h2 id="user-display-name">---</h2>
                    <span id="user-role-badge" class="role-badge">---</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">USER ID</span>
                    <span id="user-id-number" class="stat-value">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SECURITY</span>
                    <span id="security-level" class="stat-value">---</span>
                </div>
            </div>

            <div class="post-form">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" class="av-opt" onclick="setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" class="av-opt" onclick="setAvatar(this.src)">
                    <label class="upload-label" for="avatar-upload">UPLOAD FROM PC</label>
                    <input type="file" id="avatar-upload" accept="image/*" onchange="uploadAvatar(this)">
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>

<div id="auth-modal" class="modal-overlay" style="display:none;" onclick="closeAuthModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 id="modal-title">SYSTEM ACCESS</h2>
        <input type="text" id="auth-nickname" placeholder="NICKNAME" style="display: none;">
        <input type="email" id="auth-email" placeholder="EMAIL">
        <input type="password" id="auth-password" placeholder="PASSWORD">
        <button id="auth-submit-btn" class="auth-submit" onclick="handleAuth()">CONFIRM</button>
        <p id="auth-toggle-text" class="auth-switch" onclick="toggleAuthMode()">Регистрация</p>
    </div>
</div>

<div id="chat-input-zone" class="input-broadcast-zone" style="display: none;">
    <button class="toggle-input-btn" onclick="toggleInputZone()">–</button>
    <div class="input-glass-container">
        <div class="input-wrapper">
            <textarea id="chat-msg-input" placeholder="Secure transmission..." rows="1" oninput="autoResize(this)"></textarea>
            <button class="send-trigger" onclick="handleSend()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<div class="system-footer-status">
    <span class="live-dot"></span> NODE: <span class="accent-white">KILLA-01</span> 
    USERS: <span id="live-users-count" class="accent-white">0</span>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
