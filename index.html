<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA NETWORK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>

<header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="window.showTab(event, 'news-section')">NEWS</button>
        <button id="chat-tab-btn" class="tab-btn" onclick="window.showTab(event, 'chat-section')" style="display:none;">CHAT</button>
        <button class="tab-btn" onclick="window.showTab(event, 'info-section')">INFO</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login main-access-btn" onclick="openAuthModal()">ACCESS</button>
    </div>
</header>

<main>
    <section id="news-section" class="content-section active">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="chat-section" class="content-section">
        <div id="chat-messages" class="chat-box"></div>
    </section>

    <section id="info-section" class="content-section">
        <div class="card info-card">
            <h3>SYSTEM STATUS: <span style="color: #00ff00;">ENCRYPTED</span></h3>
            <p>Добро пожаловать в защищенный узел KILLA. Все сообщения шифруются.</p>
            <p>Протокол: <b>v2.1.0-STABLE</b></p>
        </div>
    </section>

    <section id="cabinet-section" class="content-section">
        <div class="card profile-card">
            <div class="profile-header">
                <img id="user-avatar-display" src="" class="avatar-current">
                <div class="profile-info">
                    <h2 id="user-display-name">---</h2>
                    <span id="user-role-badge" class="role-badge">---</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">UID: #<span id="user-id-number">---</span></div>
                <div class="stat-item">SECURE: <span id="security-level">---</span></div>
            </div>
            
            <div class="avatar-config">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Shadow" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Tech" onclick="window.setAvatar(this.src)">
                </div>
            </div>
            <button class="logout-btn" onclick="window.handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>

<div id="chat-input-zone" class="chat-input-area" style="display:none;">
    <div class="input-wrapper">
        <input type="text" id="chat-msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') window.handleSend()">
        <button class="send-btn" onclick="window.handleSend()">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

     const firebaseConfig = {

        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",

        authDomain: "killa-c8794.firebaseapp.com",

        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",

        projectId: "killa-c8794",

        storageBucket: "killa-c8794.firebasestorage.app",

        messagingSenderId: "209292210267",

        appId: "1:209292210267:web:b320358f45a21ad1284f7e",

        measurementId: "G-BFYYQELE6C"

    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Умное переключение вкладок
    window.showTab = (event, tabId) => {
        document.querySelectorAll('.content-section').forEach(s => {
            s.style.display = 'none';
            s.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const target = document.getElementById(tabId);
        if(target) {
            target.style.display = 'block';
            target.classList.add('active');
        }
        if(event) event.currentTarget.classList.add('active');

        // Скрываем ввод везде, кроме News и Chat
        const inputZone = document.getElementById('chat-input-zone');
        if ((tabId === 'news-section' || tabId === 'chat-section') && auth.currentUser) {
            inputZone.style.display = 'block';
        } else {
            inputZone.style.display = 'none';
        }
    };

    // Отправка без ошибок "Заполни поля"
    window.handleSend = async () => {
        const input = document.getElementById('chat-msg-input');
        const text = input.value.trim();
        if(!text || !auth.currentUser) return;

        const snap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const userData = snap.val();
        
        const activeTab = document.querySelector('.content-section.active').id;
        const targetPath = activeTab === 'chat-section' ? 'chat_messages' : 'posts';

        await push(ref(db, targetPath), {
            text, 
            author: userData.name, 
            role: userData.role, 
            timestamp: Date.now()
        });
        input.value = '';
    };

    window.handleLogout = () => signOut(auth).then(() => location.reload());

    window.setAvatar = async (url) => {
        if(!auth.currentUser) return;
        await set(ref(db, `users/${auth.currentUser.uid}/avatar`), url);
        document.getElementById('user-avatar-display').src = url;
    };

    // Главный слушатель входа
    onAuthStateChanged(auth, async (user) => {
        const authBtn = document.getElementById('auth-btn');
        const chatTabBtn = document.getElementById('chat-tab-btn');
        
        if (user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            let userData = snap.val();

            // Создание ID (1, 2, 3...)
            if(!userData || !userData.id) {
                const countSnap = await get(ref(db, 'system/users_count'));
                const newId = (countSnap.val() || 0) + 1;
                const baseData = userData || { name: user.email.split('@')[0], role: 'Member' };
                baseData.id = newId;
                await set(userRef, baseData);
                await set(ref(db, 'system/users_count'), newId);
                userData = baseData;
            }

            // Роли и цвета
            const roles = {
                'Developer': { color: '#3eafff', lv: 6 },
                'Owner': { color: '#ff3e3e', lv: 5 },
                'Крутой поц': { color: '#ae70ff', lv: 3 }
            };
            const currentRole = roles[userData.role] || { color: '#888', lv: 1 };

            // Обновление интерфейса
            document.getElementById('user-id-number').innerText = userData.id;
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-role-badge').innerText = userData.role;
            document.getElementById('user-role-badge').style.color = currentRole.color;
            document.getElementById('security-level').innerText = "Level " + currentRole.lv;
            document.getElementById('user-avatar-display').src = userData.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + user.uid;
            
            authBtn.innerText = userData.name.toUpperCase();
            authBtn.classList.remove('main-access-btn');
            authBtn.style.color = currentRole.color;
            authBtn.style.borderColor = currentRole.color;
            authBtn.onclick = () => window.showTab(null, 'cabinet-section');

            chatTabBtn.style.display = 'inline-block';
            if (currentRole.lv >= 3) document.getElementById('chat-input-zone').style.display = 'block';
        } else {
            authBtn.classList.add('main-access-btn');
            chatTabBtn.style.display = 'none';
        }
    });

    // Чат в реальном времени
    onValue(ref(db, 'chat_messages'), (snap) => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        if(snap.exists()) {
            Object.values(snap.val()).forEach(m => {
                box.innerHTML += `<div class="chat-msg"><b>${m.author}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    });
</script>
</body>
</html>
