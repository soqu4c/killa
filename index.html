<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Killa</div>
        <div id="auth-btn" class="btn-login" onclick="openAuthModal()">Cabinet</div>
    </header>

    <main class="main-content">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showTab(event, 'news')">News</button>
            <button class="tab-btn" onclick="showTab(event, 'info')">Info</button>
            <button class="tab-btn" id="cabinet-tab" onclick="showTab(event, 'cabinet')" style="display: none;">Private</button>
        </div>

        <div id="news" class="content-section active">
            <div id="news-container"></div>
        </div>

        <div id="info" class="content-section">
            <div class="card">
                <h3>PROJECT INFO</h3>
                <p>Система управления ролями и контентом. Доступ только для авторизованных пользователей.</p>
            </div>
        </div>

        <div id="cabinet" class="content-section">
            <div class="card">
                <h3>PROFILE: <span id="user-display-name">---</span></h3>
                <p>Role: <span id="user-role-badge" class="role-badge">MEMBER</span></p>
                
                <hr style="border: 0; border-top: 1px solid #111; margin: 20px 0;">
                
                <div class="post-form">
                    <h4>PUBLISH NEWS</h4>
                    <input type="text" id="news-title" placeholder="ЗАГОЛОВОК">
                    <textarea id="news-text" placeholder="ТЕКСТ НОВОСТИ..."></textarea>
                    <button class="auth-submit" onclick="publishNews()">POST</button>
                </div>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal-overlay" onclick="closeAuth()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title">SYSTEM ACCESS</h2>
            <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
            <input type="email" id="auth-email" placeholder="EMAIL">
            <input type="password" id="auth-password" placeholder="PASSWORD">
            <button class="auth-submit" onclick="handleAuth()">CONFIRM</button>
            <p class="auth-switch" onclick="toggleAuthMode()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    // Импортируем Realtime Database
    import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        // Твои данные из image_afeda1.png
         apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",
  authDomain: "killa-c8794.firebaseapp.com",
  databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",
  projectId: "killa-c8794",
  storageBucket: "killa-c8794.firebasestorage.app",
  messagingSenderId: "209292210267",
  appId: "1:209292210267:web:b320358f45a21ad1284f7e",
  measurementId: "G-BFYYQELE6C"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase(app);

    let currentUserData = null;

    // Публикация новости в Realtime Database
    window.publishNews = () => {
        const title = document.getElementById('news-title').value;
        const text = document.getElementById('news-text').value;
        if(!title || !text) return alert("Заполни поля");

        const postsRef = ref(db, 'posts');
        const newPostRef = push(postsRef); // Создает уникальный ID
        set(newPostRef, {
            title: title,
            text: text,
            author: auth.currentUser.displayName || "User",
            role: currentUserData?.role || 'Member',
            date: Date.now()
        });

        document.getElementById('news-title').value = '';
        document.getElementById('news-text').value = '';
    };

    // Слушаем новости (Realtime!)
    const postsRef = ref(db, 'posts');
    onValue(postsRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('news-container');
        container.innerHTML = '';
        
        if (data) {
            // Превращаем объект в массив и сортируем по дате (новые сверху)
            const posts = Object.values(data).sort((a, b) => b.date - a.date);
            posts.forEach(post => {
                const style = roleStyles[post.role] || roleStyles['Member'];
                container.innerHTML += `
                    <div class="card news-card">
                        <div class="author-info">
                            <span class="author-name">${post.author}</span>
                            <span class="role-tag" style="color:${style.color}">[${post.role}]</span>
                        </div>
                        <h3>${post.title}</h3>
                        <p>${post.text}</p>
                    </div>
                `;
            });
        }
    });

    onAuthStateChanged(auth, async (user) => {
        const cab = document.getElementById('cabinet-tab');
        if (user) {
            // Получаем роль юзера
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                currentUserData = snapshot.val();
            } else {
                // Если юзера нет в БД, создаем его
                currentUserData = { role: 'Member', name: user.displayName };
                set(userRef, currentUserData);
            }

            document.getElementById('user-display-name').innerText = user.displayName;
            document.getElementById('user-role-badge').innerText = currentUserData.role;
            document.getElementById('user-role-badge').style.color = roleStyles[currentUserData.role].color;
            cab.style.display = 'block';
        } else {
            cab.style.display = 'none';
        }
    });
</script>
</body>
</html>
