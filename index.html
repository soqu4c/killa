<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>

<header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="window.showTab(event, 'news-section')">NEWS</button>
        <button id="chat-tab-btn" class="tab-btn" onclick="window.showTab(event, 'chat-section')" style="display:none;">CHAT</button>
        <button class="tab-btn" onclick="window.showTab(event, 'info-section')">INFO</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login main-access-btn" onclick="window.openAuthModal()">ACCESS</button>
    </div>
</header>

<main>
    <section id="news-section" class="content-section active">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="info-section" class="content-section">
        <div class="card">
            <h3>SYSTEM INFORMATION</h3>
            <p style="color: #444; font-size: 12px;">Infrastructure status: <span style="color: #00ff00;">ONLINE</span></p>
            <p>Welcome to the encrypted KILLA node. All communications are protected by end-to-end encryption.</p>
        </div>
    </section>

    <section id="chat-section" class="content-section">
        <div id="chat-messages" class="chat-box"></div>
    </section>

    <section id="cabinet-section" class="content-section">
        <div class="card profile-card">
            <div class="profile-main-info">
                <img id="user-avatar-display" src="" class="avatar-current" alt="Avatar">
                <div class="profile-text-info">
                    <h2 id="user-display-name">---</h2>
                    <span id="user-role-badge" class="role-badge">---</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">USER ID</span>
                    <span id="user-id-number" class="stat-value" style="color: #3eafff;">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SECURITY LEVEL</span>
                    <span id="security-level" class="stat-value">---</span>
                </div>
            </div>

            <div class="post-form">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Shadow" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Tech" class="av-opt" onclick="window.setAvatar(this.src)">
                </div>
            </div>
            
            <button class="logout-btn" onclick="window.handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>

<div id="auth-modal" class="modal-overlay" onclick="window.closeAuth()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 id="modal-title">SYSTEM ACCESS</h2>
        <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
        <input type="email" id="auth-email" placeholder="EMAIL">
        <input type="password" id="auth-password" placeholder="PASSWORD">
        <button class="auth-submit" onclick="window.handleAuth()">CONFIRM</button>
        <p class="auth-switch" onclick="window.toggleAuthMode()">Нет аккаунта? Регистрация</p>
    </div>
</div>

<div id="chat-input-zone" class="chat-input-area" style="display:none;">
    <div class="input-wrapper">
        <input type="text" id="chat-msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') window.handleSend()">
        <button class="send-btn" onclick="window.handleSend()">
            <svg viewBox="0 0 24 24" width="20" fill="#3eafff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

     const firebaseConfig = {

        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",

        authDomain: "killa-c8794.firebaseapp.com",

        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",

        projectId: "killa-c8794",

        storageBucket: "killa-c8794.firebasestorage.app",

        messagingSenderId: "209292210267",

        appId: "1:209292210267:web:b320358f45a21ad1284f7e",

        measurementId: "G-BFYYQELE6C"

    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const roleStyles = {
        'Developer': { color: '#3eafff', level: 6 },
        'Owner': { color: '#ff3e3e', level: 5 },
        'Крутой поц': { color: '#00ff00', level: 3 },
        'Member': { color: '#888', level: 1 }
    };

    // --- ФУНКЦИИ ОКИН ---
    window.openAuthModal = () => document.getElementById('auth-modal').style.display = 'block';
    window.closeAuth = () => document.getElementById('auth-modal').style.display = 'none';

    window.toggleAuthMode = () => {
        const loginField = document.getElementById('auth-login');
        const title = document.getElementById('modal-title');
        const isReg = loginField.style.display === 'none';
        loginField.style.display = isReg ? 'block' : 'none';
        title.innerText = isReg ? 'REGISTRATION' : 'SYSTEM ACCESS';
    };

    window.showTab = (event, tabId) => {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        if(event) event.currentTarget.classList.add('active');

        const inputZone = document.getElementById('chat-input-zone');
        if ((tabId === 'news-section' || tabId === 'chat-section') && auth.currentUser) {
            inputZone.style.display = 'block';
        } else {
            inputZone.style.display = 'none';
        }
    };

    window.handleAuth = async () => {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-password').value;
    const nick = document.getElementById('auth-login').value.trim();
    const isReg = document.getElementById('auth-login').style.display !== 'none';

    if (!email || !pass) return alert("Fill in all fields");

    try {
        if (isReg) {
            console.log("Creating user...");
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            
            console.log("Getting ID counter...");
            const countRef = ref(db, 'system/users_count');
            const countSnap = await get(countRef);
            const newId = (countSnap.val() || 0) + 1;

            const userData = {
                id: newId,
                name: nick || email.split('@')[0],
                role: 'Member',
                avatar: 'https://api.dicebear.com/7.x/identicon/svg?seed=' + res.user.uid
            };

            console.log("Saving to Database...");
            // КРИТИЧЕСКИЙ МОМЕНТ: Записываем данные в базу
            await set(ref(db, 'users/' + res.user.uid), userData);
            await set(countRef, newId);
            
            console.log("DB Write Success!");
        } else {
            await signInWithEmailAndPassword(auth, email, pass);
        }
        
        window.closeAuth();
        setTimeout(() => location.reload(), 300);

    } catch (e) {
        console.error("Auth/DB Error:", e);
        // Если ошибка здесь, значит данные не записались в базу!
        alert("Action failed: " + e.message);
    }
};
    window.handleSend = async () => {
    const input = document.getElementById('chat-msg-input');
    const text = input.value.trim();
    if (!text || !auth.currentUser) return;

    try {
        const snap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const userData = snap.val();

        // ЗАЩИТА: Если данных в базе нет, берем временные из профиля Google
        const authorName = userData ? userData.name : auth.currentUser.email.split('@')[0];
        const authorRole = userData ? userData.role : 'Member';

        const isChat = document.getElementById('chat-section').style.display === 'block';

        await push(ref(db, isChat ? 'chat_messages' : 'posts'), {
            text: text,
            author: authorName,
            role: authorRole,
            timestamp: Date.now()
        });
        
        input.value = '';
    } catch (e) {
        console.error("Ошибка отправки:", e);
    }
};

    window.setAvatar = (url) => set(ref(db, `users/${auth.currentUser.uid}/avatar`), url);
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    // --- СЛУШАТЕЛИ ---
    onAuthStateChanged(auth, async (user) => {
    const authBtn = document.getElementById('auth-btn');
    const chatTabBtn = document.getElementById('chat-tab-btn');
    
    if (user) {
        console.log("Auth detected:", user.email);
        
        // 1. Сначала меняем кнопку на "Loading...", чтобы юзер видел прогресс
        authBtn.innerText = "LOADING...";

        try {
            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            const userData = snap.val();

            if (userData) {
                const rStyle = roleStyles[userData.role] || roleStyles['Member'];

                // Обновляем текст в кабинете
                document.getElementById('user-id-number').innerText = userData.id;
                document.getElementById('user-display-name').innerText = userData.name;
                document.getElementById('user-role-badge').innerText = userData.role;
                document.getElementById('user-role-badge').style.color = rStyle.color;
                document.getElementById('security-level').innerText = "Level " + rStyle.level;
                document.getElementById('user-avatar-display').src = userData.avatar || '';

                // Обновляем кнопку в шапке
                authBtn.innerText = userData.name.toUpperCase();
                authBtn.onclick = (e) => {
                    e.preventDefault();
                    window.showTab(null, 'cabinet-section');
                };

                // Показываем чат
                chatTabBtn.style.display = 'inline-block';
                
                // Если мы на странице новостей/чата, показываем поле ввода
                const currentTab = document.querySelector('.content-section[style*="block"]')?.id;
                if (currentTab === 'news-section' || currentTab === 'chat-section') {
                    document.getElementById('chat-input-zone').style.display = 'block';
                }
            } else {
                console.warn("No user data found in DB for UID:", user.uid);
                authBtn.innerText = "NO PROFILE";
            }
        } catch (e) {
            console.error("Database error:", e);
            authBtn.innerText = "DB ERROR";
        }
    } else {
        // Если юзер не залогинен
        authBtn.innerText = "ACCESS";
        authBtn.onclick = () => window.openAuthModal();
        chatTabBtn.style.display = 'none';
        document.getElementById('chat-input-zone').style.display = 'none';
    }
});
    onValue(ref(db, 'chat_messages'), (snap) => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        if(snap.exists()) {
            Object.values(snap.val()).forEach(m => {
                const color = roleStyles[m.role]?.color || '#888';
                box.innerHTML += `<div class="chat-msg"><b style="color:${color}">${m.author}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    });

    onValue(ref(db, 'posts'), (snap) => {
        const container = document.getElementById('news-container');
        container.innerHTML = '';
        if(snap.exists()) {
            Object.values(snap.val()).reverse().forEach(p => {
                const color = roleStyles[p.role]?.color || '#888';
                container.innerHTML += `
                    <div class="card news-card">
                        <div class="author-info">
                            <span class="author-name">${p.author}</span>
                            <span style="color:${color}">[${p.role}]</span>
                        </div>
                        <p>${p.text}</p>
                    </div>`;
            });
        }
    });
</script>
</body>
</html>
