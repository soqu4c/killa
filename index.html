<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Killa</div>
        <div id="auth-btn" class="btn-login" onclick="openAuthModal()">Cabinet</div>
    </header>

    <main class="main-content">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showTab(event, 'news')">News</button>
            <button class="tab-btn" onclick="showTab(event, 'info')">Info</button>
            <button class="tab-btn" id="cabinet-tab" onclick="showTab(event, 'cabinet')" style="display: none;">Private</button>
        </div>

        <div id="news" class="content-section active">
            <div id="news-container"></div>
        </div>

        <div id="info" class="content-section">
            <div class="card">
                <h3>PROJECT INFO</h3>
                <p>Система управления ролями и контентом. Доступ только для авторизованных пользователей.</p>
            </div>
        </div>

        <div id="cabinet" class="content-section">
            <div class="card">
                <h3>PROFILE: <span id="user-display-name">---</span></h3>
                <p>Role: <span id="user-role-badge" class="role-badge">MEMBER</span></p>
                
                <hr style="border: 0; border-top: 1px solid #111; margin: 20px 0;">
                
                <div class="post-form">
                    <h4>PUBLISH NEWS</h4>
                    <input type="text" id="news-title" placeholder="ЗАГОЛОВОК">
                    <textarea id="news-text" placeholder="ТЕКСТ НОВОСТИ..."></textarea>
                    <button class="auth-submit" onclick="publishNews()">POST</button>
                </div>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal-overlay" onclick="closeAuth()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title">SYSTEM ACCESS</h2>
            <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
            <input type="email" id="auth-email" placeholder="EMAIL">
            <input type="password" id="auth-password" placeholder="PASSWORD">
            <button class="auth-submit" onclick="handleAuth()">CONFIRM</button>
            <p class="auth-switch" onclick="toggleAuthMode()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",
  authDomain: "killa-c8794.firebaseapp.com",
  projectId: "killa-c8794",
  storageBucket: "killa-c8794.firebasestorage.app",
  messagingSenderId: "209292210267",
  appId: "1:209292210267:web:b320358f45a21ad1284f7e",
  measurementId: "G-BFYYQELE6C"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        let currentUserData = null;

        // Роли и цвета
        const roleStyles = {
            'Owner': { color: '#ff3e3e', shadow: '0 0 10px rgba(255, 62, 62, 0.5)' },
            'Dep.Owner': { color: '#ff8a3e', shadow: '0 0 10px rgba(255, 138, 62, 0.5)' },
            'Developer': { color: '#3eafff', shadow: '0 0 10px rgba(62, 175, 255, 0.5)' },
            'Member': { color: '#888', shadow: 'none' }
        };

        // Публикация новости
        window.publishNews = async () => {
            const title = document.getElementById('news-title').value;
            const text = document.getElementById('news-text').value;
            if(!title || !text) return alert("Заполни поля");

            await addDoc(collection(db, "posts"), {
                title: title,
                text: text,
                author: auth.currentUser.displayName,
                role: currentUserData.role || 'Member',
                date: Date.now()
            });
            alert("Опубликовано!");
            document.getElementById('news-title').value = '';
            document.getElementById('news-text').value = '';
        };

        // Подгрузка новостей в реальном времени
        const q = query(collection(db, "posts"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const style = roleStyles[data.role] || roleStyles['Member'];
                container.innerHTML += `
                    <div class="card news-card">
                        <div class="author-info">
                            <span class="author-name">${data.author}</span>
                            <span class="role-tag" style="color:${style.color}; text-shadow:${style.shadow}">[${data.role}]</span>
                        </div>
                        <h3>${data.title}</h3>
                        <p>${data.text}</p>
                    </div>
                `;
            });
        });

        // Авторизация с сохранением роли в БД
        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const nick = document.getElementById('auth-login').value;

            try {
                if (document.getElementById('auth-login').style.display !== 'none') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: nick });
                    // По умолчанию даем роль Member (ты сможешь сменить в консоли Firebase на Owner)
                    await setDoc(doc(db, "users", res.user.uid), { role: 'Member', name: nick });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                closeAuth();
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
    const cab = document.getElementById('cabinet-tab');
    const authBtn = document.getElementById('auth-btn');
    
    if (user) {
        try {
            const userDocRef = doc(db, "users", user.uid);
            let userSnap = await getDoc(userDocRef);

            // Если записи в БД нет, создаем её (чтобы кабинет заработал)
            if (!userSnap.exists()) {
                await setDoc(userDocRef, { 
                    role: 'Member', 
                    name: user.displayName || user.email.split('@')[0] 
                });
                userSnap = await getDoc(userDocRef);
            }

            currentUserData = userSnap.data();
            
            // Обновляем интерфейс
            document.getElementById('user-display-name').innerText = user.displayName || "User";
            const badge = document.getElementById('user-role-badge');
            badge.innerText = currentUserData.role;
            badge.style.color = roleStyles[currentUserData.role]?.color || '#888';

            authBtn.innerText = (user.displayName || "CABINET").toUpperCase();
            authBtn.onclick = () => { if(confirm("Log out?")) signOut(auth); };
            cab.style.display = 'block';
            
        } catch (error) {
            console.error("Ошибка загрузки профиля:", error);
        }
    } else {
        // Если вышел из системы
        cab.style.display = 'none';
        authBtn.innerText = 'CABINET';
        authBtn.onclick = openAuthModal;
        showTab(null, 'news');
    }
});
        window.showTab = (e, id) => {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            if(e) e.currentTarget.classList.add('active');
        };
        
        window.openAuthModal = () => document.getElementById('auth-modal').style.display = 'flex';
        window.closeAuth = () => document.getElementById('auth-modal').style.display = 'none';
        window.toggleAuthMode = () => {
            const loginField = document.getElementById('auth-login');
            loginField.style.display = loginField.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
