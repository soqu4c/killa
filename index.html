<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="showTab(event, 'news-section')">NEWS</button>
        <button class="tab-btn" onclick="showTab(event, 'chat-section')">CHAT</button>
        <button id="cabinet-tab-btn" class="tab-btn" onclick="showTab(event, 'cabinet-section')" style="display:none;">CABINET</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login" onclick="openAuthModal()">ACCESS</button>
    </div>
</header>

<main>
    <section id="news-section" class="content-section active">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="chat-section" class="content-section">
        <div id="chat-messages" class="chat-box"></div>
        <div id="chat-input-area" class="chat-input-bar" style="display:none;">
            <input type="text" id="chat-input" placeholder="Secure message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button onclick="sendChatMessage()">SEND</button>
        </div>
    </section>

    <section id="cabinet-section" class="content-section">
        <div class="card profile-card">
            <h2 id="user-display-name">---</h2>
            <div id="user-role-badge" class="role-badge">---</div>
            <p>SECURITY: <span id="security-level">---</span></p>
            <hr>
            <div class="settings-mini">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" onclick="updateAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" onclick="updateAvatar(this.src)">
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>
<div id="cabinet" class="content-section">
    <div class="card profile-card">
        <div class="profile-header">
            <h2 id="user-display-name">---</h2>
            <span id="user-role-badge" class="role-badge">MEMBER</span>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Access Status</span>
                <span class="stat-value" style="color: #00ff00;">Active</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Security Level</span>
                <span id="security-level" class="stat-value">Level 1</span>
            </div>
        </div>

        <div class="post-form">
            <h4>CREATE BROADCAST</h4>
            <input type="text" id="news-title" placeholder="TITLE">
            <textarea id="news-text" placeholder="ENCRYPTED MESSAGE..."></textarea>
            <button class="auth-submit" onclick="publishNews()">SEND TO FEED</button>
        </div>

        <button class="logout-btn" onclick="handleLogout()">TERMINATE SESSION</button>
    </div>
</div>

        <div id="cabinet" class="content-section">
            <div class="card">
                <h3>PROFILE: <span id="user-display-name">---</span></h3>
                <p>Role: <span id="user-role-badge" class="role-badge">MEMBER</span></p>
                
                <hr style="border: 0; border-top: 1px solid #111; margin: 20px 0;">
                
                <div class="post-form">
                    <h4>PUBLISH NEWS</h4>
                    <input type="text" id="news-title" placeholder="ЗАГОЛОВОК">
                    <textarea id="news-text" placeholder="ТЕКСТ НОВОСТИ..."></textarea>
                    <button class="auth-submit" onclick="publishNews()">POST</button>
                </div>
            </div>
        </div>

        <div id="settings" class="content-section">
    <div class="card">
        <h3>SYSTEM SETTINGS</h3>
        <div class="avatar-selection">
            <p>Select Avatar Component:</p>
            <div class="avatar-grid">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" class="av-opt" onclick="setAvatar(this.src)">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=2" class="av-opt" onclick="setAvatar(this.src)">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=3" class="av-opt" onclick="setAvatar(this.src)">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" class="av-opt" onclick="setAvatar(this.src)">
            </div>
        </div>
        <button class="auth-submit" onclick="showTab(null, 'cabinet')">SAVE CHANGES</button>
    </div>
</div>
    </main>

    <div id="auth-modal" class="modal-overlay" onclick="closeAuth()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title">SYSTEM ACCESS</h2>
            <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
            <input type="email" id="auth-email" placeholder="EMAIL">
            <input type="password" id="auth-password" placeholder="PASSWORD">
            <button class="auth-submit" onclick="handleAuth()">CONFIRM</button>
            <p class="auth-switch" onclick="toggleAuthMode()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="news-input-zone" class="chat-input-container" style="display: none;">
    <div class="chat-inner">
        <textarea id="news-text" placeholder="Write a broadcast message..." rows="1"></textarea>
        <button class="send-btn" onclick="publishNews()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",
        authDomain: "killa-c8794.firebaseapp.com",
        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",
        projectId: "killa-c8794",
        storageBucket: "killa-c8794.firebasestorage.app",
        messagingSenderId: "209292210267",
        appId: "1:209292210267:web:b320358f45a21ad1284f7e",
        measurementId: "G-BFYYQELE6C"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase(app);

    const roleStyles = {
    'Developer': { color: '#3eafff', level: 'Level 6 (SYSTEM CORE)' }, // Самый высокий
    'Owner': { color: '#ff3e3e', level: 'Level 5 (ROOT)' },
    'Dep.Owner': { color: '#ff8a3e', level: 'Level 4 (ADMIN)' },
    'Крутой поц': { color: '#ae70ff', level: 'Level 3 (ELITE)' }, // Новая роль
    'Member': { color: '#888', level: 'Level 1 (GUEST)' }
};
    // --- ГЛОБАЛЬНЫЕ ФУНКЦИИ (Для работы onclick в HTML) ---
    
    window.openAuthModal = () => {
        document.getElementById('auth-modal').style.display = 'block';
    };

    window.closeAuth = () => {
        document.getElementById('auth-modal').style.display = 'none';
    };

    window.showTab = (event, tabId) => {
        // Скрываем все секции
        document.querySelectorAll('.content-section').forEach(section => {
            section.style.display = 'none';
            section.classList.remove('active');
        });
        // Убираем активный класс у кнопок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        // Показываем нужную
        document.getElementById(tabId).style.display = 'block';
        if (event) event.currentTarget.classList.add('active');
    };

    window.toggleAuthMode = () => {
        const loginField = document.getElementById('auth-login');
        const title = document.getElementById('modal-title');
        if (loginField.style.display === 'none') {
            loginField.style.display = 'block';
            title.innerText = 'REGISTRATION';
        } else {
            loginField.style.display = 'none';
            title.innerText = 'SYSTEM ACCESS';
        }
    };

    // --- ЛОГИКА АВТОРИЗАЦИИ И БД ---

    onValue(ref(db, 'posts'), (snapshot) => {
        const container = document.getElementById('news-container');
        if (!container) return;
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.values(data).reverse().forEach(post => {
                const style = roleStyles[post.role] || roleStyles['Member'];
                container.innerHTML += `
                    <div class="card news-card">
                        <div class="author-info">
                            <span class="author-name">${post.author}</span>
                            <span class="role-tag" style="color:${style.color}">[${post.role}]</span>
                        </div>
                        <h3>${post.title}</h3>
                        <p>${post.text}</p>
                    </div>`;
            });
        }
    });

    // Добавь эту функцию в window
// Функция для выхода (явно прописываем в window)
window.handleLogout = () => {
    signOut(auth).then(() => {
        // Скрываем кабинет и переключаем на новости
        document.getElementById('cabinet-tab').style.display = 'none';
        window.showTab(null, 'news');
    }).catch(e => console.error(e));
};

// Переключение меню
window.toggleUserMenu = () => {
    const menu = document.getElementById('user-dropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
};

// Закрытие меню при клике вне его
window.onclick = (e) => {
    if (!e.target.matches('#auth-btn')) {
        document.getElementById('user-dropdown').style.display = 'none';
    }
};

// --- ЛОГИКА ЧАТА ---
window.sendChatMessage = async () => {
    const input = document.getElementById('chat-input');
    if(!input.value.trim()) return;

    const user = auth.currentUser;
    const userRef = ref(db, 'users/' + user.uid);
    const snap = await get(userRef);
    const userData = snap.val();

    await push(ref(db, 'chat_messages'), {
        text: input.value,
        author: userData.name,
        role: userData.role,
        time: Date.now()
    });
    input.value = '';
};

// Слушаем ЧАТ
onValue(ref(db, 'chat_messages'), (snapshot) => {
    const box = document.getElementById('chat-messages');
    box.innerHTML = '';
    const data = snapshot.val();
    if(data) {
        Object.values(data).forEach(msg => {
            const color = roleStyles[msg.role]?.color || '#888';
            box.innerHTML += `
                <div class="chat-msg">
                    <b style="color:${color}">${msg.author}:</b>
                    <span>${msg.text}</span>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }
});

// --- ОБНОВЛЕНИЕ СОСТОЯНИЯ ---
onAuthStateChanged(auth, async (user) => {
    const chatInput = document.getElementById('chat-input-area');
    const cabBtn = document.getElementById('cabinet-tab-btn');
    
    if (user) {
        const snap = await get(ref(db, 'users/' + user.uid));
        const userData = snap.val() || {};
        
        // Показываем кнопку кабинета и ввод в чат
        cabBtn.style.display = 'inline-block';
        chatInput.style.display = 'flex';
        
        // Настраиваем иерархию (Dev > Owner)
        const levels = { 'Developer': 6, 'Owner': 5, 'Крутой поц': 3, 'Member': 1 };
        const currentLevel = levels[userData.role] || 1;
        
        document.getElementById('security-level').innerText = currentLevel;
        document.getElementById('auth-btn').innerText = userData.name.toUpperCase();
    } else {
        cabBtn.style.display = 'none';
        chatInput.style.display = 'none';
        document.getElementById('auth-btn').innerText = 'ACCESS';
        showTab(null, 'news-section');
    }
});

window.setAvatar = async (url) => {
    await set(ref(db, `users/${auth.currentUser.uid}/avatar`), url);
    alert("Avatar updated!");
};
    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        const nick = document.getElementById('auth-login').value;
        const isReg = document.getElementById('auth-login').style.display !== 'none';

        try {
            if (isReg) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: nick });
                await set(ref(db, 'users/' + res.user.uid), { role: 'Member', name: nick });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
            window.closeAuth();
        } catch (e) { alert(e.message); }
    };

    window.publishNews = async () => {
        const title = document.getElementById('news-title').value;
        const text = document.getElementById('news-text').value;
        if(!title || !text) return alert("Заполни поля");

        const userSnap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const role = userSnap.val()?.role || 'Member';

        await push(ref(db, 'posts'), {
            title, text, role,
            author: auth.currentUser.displayName,
            date: Date.now()
        });
        alert("Опубликовано!");
        document.getElementById('news-title').value = '';
        document.getElementById('news-text').value = '';
    };
</script>
</body>
</html>
