<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для аватарок */
        .avatar-current { width: 80px; height: 80px; border-radius: 5px; border: 2px solid #3eafff; object-fit: cover; background: #111; }
        .av-opt { width: 40px; height: 40px; cursor: pointer; border: 1px solid #333; transition: 0.3s; margin: 5px; }
        .av-opt:hover { border-color: #3eafff; transform: scale(1.1); }
        .upload-label { display: inline-block; margin-top: 10px; color: #3eafff; cursor: pointer; font-size: 12px; text-decoration: underline; }
        #avatar-upload { display: none; }
        
        /* Исправление наложения Welcome */
        .welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; pointer-events: none;
        }
        .welcome-text { font-size: 60px; color: #fff; text-shadow: 0 0 20px #3eafff; font-family: monospace; font-weight: 900; letter-spacing: 10px; }

        /* Начальный лоадер */
        .initial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: 0.8s ease;
        }
        .giant-welcome { font-size: 80px; color: #fff; font-weight: 900; letter-spacing: 20px; }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="window.showTab(event, 'news-section')">NEWS</button>
        <button id="chat-tab-btn" class="tab-btn" onclick="window.showTab(event, 'chat-section')" style="display:none;">CHAT</button>
        <button class="tab-btn" onclick="window.showTab(event, 'info-section')">INFO</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login main-access-btn" onclick="window.openAuthModal()">ACCESS</button>
    </div>
</header>

<main>
    <div id="initial-loader" class="initial-overlay">
        <h1 class="giant-welcome">WELCOME</h1>
    </div>

    <div id="global-welcome" class="welcome-overlay" style="display: none;">
        <h1 class="welcome-text">HELLO, <span id="user-display-name-global"></span></h1>
    </div>

    <section id="news-section" class="content-section" style="display: block;">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="info-section" class="content-section" style="display: none;">
        <div class="card">
            <h3>SYSTEM INFORMATION</h3>
            <p style="color: #00ff00; font-size: 12px;">Status: ONLINE</p>
            <p>Welcome to KILLA node. All data encrypted.</p>
        </div>
    </section>

    <section id="chat-section" class="content-section" style="display: none;">
        <div id="chat-messages" class="chat-box"></div>
    </section>

    <section id="cabinet-section" class="content-section" style="display: none;">
        <div class="card profile-card">
            <h1 id="welcome-title">PROFILE CONFIG</h1>
            <div class="profile-main-info">
                <img id="user-avatar-display" src="" class="avatar-current" alt="AV">
                <div class="profile-text-info">
                    <h2 id="user-display-name">---</h2>
                    <span id="user-role-badge" class="role-badge">---</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">USER ID</span>
                    <span id="user-id-number" class="stat-value" style="color: #3eafff;">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SECURITY</span>
                    <span id="security-level" class="stat-value">---</span>
                </div>
            </div>

            <div class="post-form">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" class="av-opt" onclick="window.setAvatar(this.src)">
                    <label class="upload-label" for="avatar-upload">UPLOAD FROM PC</label>
                    <input type="file" id="avatar-upload" accept="image/*" onchange="window.uploadAvatar(this)">
                </div>
            </div>
            <button class="logout-btn" onclick="window.handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>

<div id="auth-modal" class="modal-overlay" style="display:none;" onclick="window.closeAuthModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 id="modal-title">SYSTEM ACCESS</h2>
        <input type="text" id="auth-nickname" placeholder="NICKNAME" style="display: none;">
        <input type="email" id="auth-email" placeholder="EMAIL">
        <input type="password" id="auth-password" placeholder="PASSWORD">
        <button id="auth-submit-btn" class="auth-submit" onclick="window.handleAuth()">CONFIRM</button>
        <p id="auth-toggle-text" class="auth-switch" onclick="window.toggleAuthMode()" style="cursor:pointer; color:#3eafff; margin-top:10px;">Регистрация</p>
    </div>
</div>

<div id="chat-input-zone" class="input-broadcast-zone" style="display: none;">
    <button class="toggle-input-btn" onclick="window.toggleInputZone()">–</button>
    <div class="input-glass-container">
        <div class="input-wrapper">
            <textarea id="chat-msg-input" placeholder="Secure transmission..." rows="1" oninput="window.autoResize(this)"></textarea>
            <button class="send-trigger" onclick="window.handleSend()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>
</div>

<div class="system-footer-status">
    <span class="live-dot"></span> NODE: <span class="accent-white">KILLA-01</span> 
    USERS: <span id="live-users-count" class="accent-white">0</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {

        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",
        authDomain: "killa-c8794.firebaseapp.com",
        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",
        projectId: "killa-c8794",
        storageBucket: "killa-c8794.firebasestorage.app",
        messagingSenderId: "209292210267",
        appId: "1:209292210267:web:b320358f45a21ad1284f7e",
        measurementId: "G-BFYYQELE6C"
    };;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const roleStyles = {
        'Developer': { color: '#3eafff', level: 6 },
        'Owner': { color: '#ff3e3e', level: 5 },
        'Крутой поц': { color: '#ae70ff', level: 3 },
        'Member': { color: '#888', level: 1 }
    };

    // --- АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ ---
    window.toggleAuthMode = () => {
        const title = document.getElementById('modal-title');
        const nick = document.getElementById('auth-nickname');
        const btn = document.getElementById('auth-submit-btn');
        const toggleText = document.getElementById('auth-toggle-text');

        if (nick.style.display === 'none') {
            title.innerText = "SYSTEM REGISTRATION";
            nick.style.display = 'block';
            btn.innerText = "CREATE ACCOUNT";
            toggleText.innerText = "Уже есть аккаунт? Войти";
        } else {
            title.innerText = "SYSTEM ACCESS";
            nick.style.display = 'none';
            btn.innerText = "CONFIRM";
            toggleText.innerText = "Регистрация";
        }
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        const nick = document.getElementById('auth-nickname').value;
        const isReg = document.getElementById('auth-nickname').style.display !== 'none';

        try {
            if (isReg) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + res.user.uid), {
                    name: nick || email.split('@')[0],
                    role: 'Member',
                    id: Math.floor(1000 + Math.random() * 9000),
                    avatar: 'https://api.dicebear.com/7.x/identicon/svg?seed=' + res.user.uid
                });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
            window.closeAuthModal();
        } catch (e) { alert(e.message); }
    };

    // --- UI ЛОГИКА ---
    window.showTab = (event, tabId) => {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (event) event.currentTarget.classList.add('active');

        // Скрытие инпута в INFO
        const inputZone = document.getElementById('chat-input-zone');
        if (auth.currentUser && (tabId === 'chat-section' || tabId === 'news-section')) {
            inputZone.style.display = 'block';
        } else {
            inputZone.style.display = 'none';
        }
    };

    onAuthStateChanged(auth, async (user) => {
        const authBtn = document.getElementById('auth-btn');
        const chatTab = document.getElementById('chat-tab-btn');
        const welcomeOverlay = document.getElementById('global-welcome');

        if (user) {
            const snap = await get(ref(db, 'users/' + user.uid));
            const data = snap.val();
            if (data) {
                authBtn.innerText = data.name.toUpperCase();
                document.getElementById('user-display-name').innerText = data.name;
                document.getElementById('user-id-number').innerText = data.id;
                document.getElementById('user-role-badge').innerText = data.role;
                document.getElementById('user-role-badge').style.color = roleStyles[data.role]?.color || '#888';
                document.getElementById('user-avatar-display').src = data.avatar || '';
                document.getElementById('security-level').innerText = 'LVL ' + (roleStyles[data.role]?.level || 1);
                
                chatTab.style.display = 'inline-block';
                
                // Персональное приветствие
                if (!sessionStorage.getItem('logged_in')) {
                    document.getElementById('user-display-name-global').innerText = data.name.toUpperCase();
                    welcomeOverlay.style.display = 'flex';
                    setTimeout(() => { welcomeOverlay.style.display = 'none'; }, 3000);
                    sessionStorage.setItem('logged_in', 'true');
                }
            }
        } else {
            authBtn.innerText = "ACCESS";
            chatTab.style.display = 'none';
            sessionStorage.removeItem('logged_in');
        }
    });

    // --- СЛУЖЕБНЫЕ ФУНКЦИИ ---
    window.autoResize = (t) => { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; };
    window.openAuthModal = () => document.getElementById('auth-modal').style.display = 'block';
    window.closeAuthModal = () => document.getElementById('auth-modal').style.display = 'none';
    window.toggleInputZone = () => document.getElementById('chat-input-zone').classList.toggle('minimized');
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    // Начальный Welcome
    window.addEventListener('load', () => {
        setTimeout(() => {
            const l = document.getElementById('initial-loader');
            l.style.opacity = '0';
            setTimeout(() => l.style.display = 'none', 800);
        }, 1500);
    });

    // Отправка сообщений
    window.handleSend = async () => {
        const input = document.getElementById('chat-msg-input');
        if (!input.value.trim() || !auth.currentUser) return;
        const snap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const userData = snap.val();
        const isChat = document.getElementById('chat-section').style.display === 'block';

        await push(ref(db, isChat ? 'chat_messages' : 'posts'), {
            text: input.value, author: userData.name, role: userData.role, timestamp: Date.now()
        });
        input.value = ''; input.style.height = 'auto';
    };

    // Чат и Новости в реальном времени
    onValue(ref(db, 'chat_messages'), snap => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        snap.forEach(child => {
            const m = child.val();
            const color = roleStyles[m.role]?.color || '#888';
            box.innerHTML += `<div><b style="color:${color}">${m.author}:</b> ${m.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    onValue(ref(db, 'posts'), snap => {
        const cont = document.getElementById('news-container');
        cont.innerHTML = '';
        let posts = [];
        snap.forEach(c => { posts.push(c.val()); });
        posts.reverse().forEach(p => {
            const color = roleStyles[p.role]?.color || '#888';
            cont.innerHTML += `<div class="card" style="border-left: 3px solid ${color}"><small style="color:${color}">${p.author}</small><p>${p.text}</p></div>`;
        });
    });

    // Звезды
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();
    for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5+0.1 });
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#3eafff';
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(animate);
    }
    animate();

</script>
</body>
</html>
