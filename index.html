<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header class="main-header">
    <div class="logo">KILLA</div>
    <nav class="nav-links">
        <button class="tab-btn active" onclick="window.showTab(event, 'news-section')">NEWS</button>
        <button id="chat-tab-btn" class="tab-btn" onclick="window.showTab(event, 'chat-section')" style="display:none;">CHAT</button>
        <button class="tab-btn" onclick="window.showTab(event, 'info-section')">INFO</button>
    </nav>
    <div class="user-area">
        <button id="auth-btn" class="btn-login main-access-btn" onclick="window.openAuthModal()">ACCESS</button>
    </div>
</header>

<main>

    
    <div id="global-welcome" style="display: none; padding: 20px 0 10px 0; text-align: center;">
        <h1 style="font-family: monospace; font-size: 24px; color: #fff; text-shadow: 0 0 10px #3eafff;">
            WELCOME, <span id="user-display-name-global">...</span>
        </h1>
    </div>

    <section id="news-section" class="content-section" style="display: block;">
        <div id="news-container" class="feed-container"></div>
    </section>

    <section id="info-section" class="content-section" style="display: none;">
        <div class="card">
            <h3>SYSTEM INFORMATION</h3>
            <p style="color: #555; font-size: 12px;">Status: <span style="color: #00ff00;">ONLINE</span></p>
            <p>Welcome to KILLA node. All data encrypted.</p>
        </div>
    </section>

    <section id="chat-section" class="content-section" style="display: none;">
        <div id="chat-messages" class="chat-box"></div>
    </section>

    <section id="cabinet-section" class="content-section" style="display: none;">
        <div class="card profile-card">
            <h1 id="welcome-title">WELCOME, <span id="user-display-name-welcome">...</span></h1>
            <div class="profile-main-info">
                <img id="user-avatar-display" src="" class="avatar-current" alt="AV">
                <div class="profile-text-info">
                    <h2 id="user-display-name">---</h2>
                    <span id="user-role-badge" class="role-badge">---</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">USER ID</span>
                    <span id="user-id-number" class="stat-value" style="color: #3eafff;">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SECURITY</span>
                    <span id="security-level" class="stat-value">---</span>
                </div>
            </div>

            <div class="post-form">
                <h4>AVATAR CONFIG</h4>
                <div class="avatar-grid">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Killa" class="av-opt" onclick="window.setAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Shadow" class="av-opt" onclick="window.setAvatar(this.src)">
                </div>
            </div>
            <button class="logout-btn" onclick="window.handleLogout()">TERMINATE SESSION</button>
        </div>
    </section>
</main>

<div id="auth-modal" class="modal-overlay" style="display:none;" onclick="window.closeAuth()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 id="modal-title">SYSTEM ACCESS</h2>
        <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
        <input type="email" id="auth-email" placeholder="EMAIL">
        <input type="password" id="auth-password" placeholder="PASSWORD">
        <button class="auth-submit" onclick="window.handleAuth()">CONFIRM</button>
        <p class="auth-switch" onclick="window.toggleAuthMode()">Регистрация</p>
    </div>
</div>

<div id="chat-input-zone" class="input-broadcast-zone" style="display:none;">
    <button class="toggle-input-btn" onclick="window.toggleInputHeight()">
        <span id="toggle-icon">−</span>
    </button>
    <div class="input-glass-container">
        <div class="input-wrapper">
            <textarea id="chat-msg-input" placeholder="Secure transmission..." rows="1"></textarea>
            <button class="send-trigger" onclick="window.handleSend()">SEND</button>
        </div>
    </div>
</div>

<div class="system-footer-status">
    <span class="live-dot"></span> NODE: <span class="accent-white">KILLA-01</span> 
    USERS: <span id="live-users-count" class="accent-white">0</span>
</div>

<div id="admin-console" style="display:none; position:fixed; top:0; width:100%; background:rgba(0,0,0,0.9); padding:20px; z-index:9999; color:#3eafff; font-family:monospace;">
    <div>SYSTEM TERMINAL</div>
    <input type="text" id="console-input" style="width:100%; background:none; border:none; border-left:2px solid #3eafff; color:#fff; padding-left:10px;" placeholder="Command...">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {

        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",

        authDomain: "killa-c8794.firebaseapp.com",

        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",

        projectId: "killa-c8794",

        storageBucket: "killa-c8794.firebasestorage.app",

        messagingSenderId: "209292210267",

        appId: "1:209292210267:web:b320358f45a21ad1284f7e",

        measurementId: "G-BFYYQELE6C"

    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const roleStyles = {
        'Developer': { color: '#3eafff', level: 6 },
        'Owner': { color: '#ff3e3e', level: 5 },
        'Крутой поц': { color: '#ae70ff', level: 3 },
        'Member': { color: '#888', level: 1 }
    };

    // --- STARS BACKGROUND ---
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();
    for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5+0.1 });
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#3eafff';
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(animate);
    }
    animate();

    // --- NAVIGATION ---
    window.showTab = (event, tabId) => {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        const target = document.getElementById(tabId);
        if(target) target.style.display = 'block';

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');

        const inputZone = document.getElementById('chat-input-zone');
        if ((tabId === 'news-section' || tabId === 'chat-section') && auth.currentUser) {
            inputZone.style.display = 'block';
        } else {
            inputZone.style.display = 'none';
        }
    };

    // --- AUTH ---
    window.openAuthModal = () => document.getElementById('auth-modal').style.display = 'block';
    window.closeAuth = () => document.getElementById('auth-modal').style.display = 'none';
    window.toggleAuthMode = () => {
        const loginField = document.getElementById('auth-login');
        const isReg = loginField.style.display === 'none';
        loginField.style.display = isReg ? 'block' : 'none';
        document.getElementById('modal-title').innerText = isReg ? 'REGISTRATION' : 'SYSTEM ACCESS';
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        const nick = document.getElementById('auth-login').value;
        const isReg = document.getElementById('auth-login').style.display !== 'none';

        try {
            if(isReg) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const countSnap = await get(ref(db, 'system/users_count'));
                const newId = (countSnap.val() || 0) + 1;
                await set(ref(db, 'users/' + res.user.uid), {
                    id: newId, name: nick || "User", role: 'Member', 
                    avatar: 'https://api.dicebear.com/7.x/identicon/svg?seed=' + res.user.uid
                });
                await set(ref(db, 'system/users_count'), newId);
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
            window.closeAuth();
        } catch(e) { alert(e.message); }
    };

    // --- CORE LISTENERS (ИСПРАВЛЕНО И ОБЪЕДИНЕНО) ---
    onAuthStateChanged(auth, async (user) => {
        const authBtn = document.getElementById('auth-btn');
        const inputZone = document.getElementById('chat-input-zone');
        const chatTab = document.getElementById('chat-tab-btn');
        const globalWelcome = document.getElementById('global-welcome'); // Блок из твоего запроса

        if(user) {
            const snap = await get(ref(db, 'users/' + user.uid));
            const data = snap.val();
            if(data) {
                // Заполняем никнейм на кнопке и в заголовках
                authBtn.innerText = data.name.toUpperCase();
                
                // Проверяем существование элементов перед заполнением
                const nameEl = document.getElementById('user-display-name');
                const welcomeEl = document.getElementById('user-display-name-global'); // ID из HTML выше
                const cabinetWelcomeEl = document.getElementById('user-display-name-welcome');

                if(nameEl) nameEl.innerText = data.name;
                if(welcomeEl) welcomeEl.innerText = data.name;
                if(cabinetWelcomeEl) cabinetWelcomeEl.innerText = data.name;

                // Показываем надпись Welcome, если она есть в HTML
                if (globalWelcome) globalWelcome.style.display = 'block';

                document.getElementById('user-role-badge').innerText = data.role;
                document.getElementById('user-id-number').innerText = data.id;
                document.getElementById('user-avatar-display').src = data.avatar;
                
                chatTab.style.display = 'inline-block';
                inputZone.style.display = 'block';
                
                authBtn.onclick = () => window.showTab(null, 'cabinet-section');
            }
        } else {
            authBtn.innerText = "ACCESS";
            authBtn.onclick = () => window.openAuthModal();
            inputZone.style.display = 'none';
            chatTab.style.display = 'none';
            
            // Скрываем Welcome при выходе
            if (globalWelcome) globalWelcome.style.display = 'none';
        }
    });

    // --- DATA FETCHING ---
    onValue(ref(db, 'posts'), (snap) => {
        const container = document.getElementById('news-container');
        if(!container) return;
        container.innerHTML = '';
        if(snap.exists()) {
            Object.values(snap.val()).reverse().forEach(p => {
                const color = roleStyles[p.role]?.color || '#888';
                container.innerHTML += `
                    <div class="card" style="border-left: 3px solid ${color}; margin-bottom:10px;">
                        <small style="color:${color}">${p.author} [${p.role}]</small>
                        <p>${p.text}</p>
                    </div>`;
            });
        }
    });

    onValue(ref(db, 'chat_messages'), (snap) => {
        const box = document.getElementById('chat-messages');
        if(!box) return;
        box.innerHTML = '';
        if(snap.exists()) {
            Object.values(snap.val()).forEach(m => {
                const color = roleStyles[m.role]?.color || '#888';
                box.innerHTML += `<div><b style="color:${color}">${m.author}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    });

    onValue(ref(db, 'system/users_count'), snap => {
        const el = document.getElementById('live-users-count');
        if(el) el.innerText = snap.val() || 0;
    });

    // --- HANDLERS ---
    window.handleSend = async () => {
        const input = document.getElementById('chat-msg-input');
        if(!input.value.trim() || !auth.currentUser) return;
        const userSnap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const userData = userSnap.val();
        
        // Проверяем какая секция сейчас открыта, чтобы знать куда писать
        const isChat = document.getElementById('chat-section').style.display === 'block';
        
        await push(ref(db, isChat ? 'chat_messages' : 'posts'), {
            text: input.value, author: userData.name, role: userData.role, timestamp: Date.now()
        });
        input.value = ''; input.style.height = 'auto';
    };

    window.toggleInputHeight = () => {
        const zone = document.getElementById('chat-input-zone');
        zone.classList.toggle('minimized');
        document.getElementById('toggle-icon').innerText = zone.classList.contains('minimized') ? '+' : '−';
    };

    window.handleLogout = () => signOut(auth).then(() => location.reload());

    window.addEventListener('keydown', (e) => {
        if(e.key === '`') {
            const c = document.getElementById('admin-console');
            if(c) c.style.display = c.style.display === 'none' ? 'block' : 'none';
        }
    });
</script>
</body>
</html>
