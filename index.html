<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLA | PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Killa</div>
        <div id="auth-btn" class="btn-login" onclick="openAuthModal()">Cabinet</div>
    </header>

    <main class="main-content">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showTab(event, 'news')">News</button>
            <button class="tab-btn" onclick="showTab(event, 'info')">Info</button>
            <button class="tab-btn" id="cabinet-tab" onclick="showTab(event, 'cabinet')" style="display: none;">Private</button>
        </div>

        <div id="news" class="content-section active">
            <div id="news-container"></div>
        </div>

        <div id="info" class="content-section">
            <div class="card">
                <h3>PROJECT INFO</h3>
                <p>Система управления ролями и контентом. Доступ только для авторизованных пользователей.</p>
            </div>
        </div>

        <div id="cabinet" class="content-section">
            <div class="card">
                <h3>PROFILE: <span id="user-display-name">---</span></h3>
                <p>Role: <span id="user-role-badge" class="role-badge">MEMBER</span></p>
                
                <hr style="border: 0; border-top: 1px solid #111; margin: 20px 0;">
                
                <div class="post-form">
                    <h4>PUBLISH NEWS</h4>
                    <input type="text" id="news-title" placeholder="ЗАГОЛОВОК">
                    <textarea id="news-text" placeholder="ТЕКСТ НОВОСТИ..."></textarea>
                    <button class="auth-submit" onclick="publishNews()">POST</button>
                </div>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal-overlay" onclick="closeAuth()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title">SYSTEM ACCESS</h2>
            <input type="text" id="auth-login" placeholder="NICKNAME" style="display: none;">
            <input type="email" id="auth-email" placeholder="EMAIL">
            <input type="password" id="auth-password" placeholder="PASSWORD">
            <button class="auth-submit" onclick="handleAuth()">CONFIRM</button>
            <p class="auth-switch" onclick="toggleAuthMode()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASOKVgbFNStdieGXpbMuVVX3Y8P7NlY6Y",
        authDomain: "killa-c8794.firebaseapp.com",
        databaseURL: "https://killa-c8794-default-rtdb.firebaseio.com",
        projectId: "killa-c8794",
        storageBucket: "killa-c8794.firebasestorage.app",
        messagingSenderId: "209292210267",
        appId: "1:209292210267:web:b320358f45a21ad1284f7e",
        measurementId: "G-BFYYQELE6C"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase(app);

    const roleStyles = {
        'Owner': { color: '#ff3e3e' },
        'Dep.Owner': { color: '#ff8a3e' },
        'Developer': { color: '#3eafff' },
        'Member': { color: '#888' }
    };

    // --- ГЛОБАЛЬНЫЕ ФУНКЦИИ (Для работы onclick в HTML) ---
    
    window.openAuthModal = () => {
        document.getElementById('auth-modal').style.display = 'block';
    };

    window.closeAuth = () => {
        document.getElementById('auth-modal').style.display = 'none';
    };

    window.showTab = (event, tabId) => {
        // Скрываем все секции
        document.querySelectorAll('.content-section').forEach(section => {
            section.style.display = 'none';
            section.classList.remove('active');
        });
        // Убираем активный класс у кнопок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        // Показываем нужную
        document.getElementById(tabId).style.display = 'block';
        if (event) event.currentTarget.classList.add('active');
    };

    window.toggleAuthMode = () => {
        const loginField = document.getElementById('auth-login');
        const title = document.getElementById('modal-title');
        if (loginField.style.display === 'none') {
            loginField.style.display = 'block';
            title.innerText = 'REGISTRATION';
        } else {
            loginField.style.display = 'none';
            title.innerText = 'SYSTEM ACCESS';
        }
    };

    // --- ЛОГИКА АВТОРИЗАЦИИ И БД ---

    onValue(ref(db, 'posts'), (snapshot) => {
        const container = document.getElementById('news-container');
        if (!container) return;
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.values(data).reverse().forEach(post => {
                const style = roleStyles[post.role] || roleStyles['Member'];
                container.innerHTML += `
                    <div class="card news-card">
                        <div class="author-info">
                            <span class="author-name">${post.author}</span>
                            <span class="role-tag" style="color:${style.color}">[${post.role}]</span>
                        </div>
                        <h3>${post.title}</h3>
                        <p>${post.text}</p>
                    </div>`;
            });
        }
    });

    onAuthStateChanged(auth, async (user) => {
        const cab = document.getElementById('cabinet-tab');
        const authBtn = document.getElementById('auth-btn');
        if (user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            let userData = snap.val();

            if (!userData) {
                userData = { role: 'Member', name: user.displayName || user.email.split('@')[0] };
                await set(userRef, userData);
            }

            document.getElementById('user-display-name').innerText = userData.name;
            const badge = document.getElementById('user-role-badge');
            badge.innerText = userData.role;
            badge.style.color = roleStyles[userData.role]?.color || '#888';
            
            authBtn.innerText = userData.name.toUpperCase();
            cab.style.display = 'block';
        } else {
            if(cab) cab.style.display = 'none';
            if(authBtn) authBtn.innerText = 'CABINET';
        }
    });

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        const nick = document.getElementById('auth-login').value;
        const isReg = document.getElementById('auth-login').style.display !== 'none';

        try {
            if (isReg) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: nick });
                await set(ref(db, 'users/' + res.user.uid), { role: 'Member', name: nick });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
            window.closeAuth();
        } catch (e) { alert(e.message); }
    };

    window.publishNews = async () => {
        const title = document.getElementById('news-title').value;
        const text = document.getElementById('news-text').value;
        if(!title || !text) return alert("Заполни поля");

        const userSnap = await get(ref(db, 'users/' + auth.currentUser.uid));
        const role = userSnap.val()?.role || 'Member';

        await push(ref(db, 'posts'), {
            title, text, role,
            author: auth.currentUser.displayName,
            date: Date.now()
        });
        alert("Опубликовано!");
        document.getElementById('news-title').value = '';
        document.getElementById('news-text').value = '';
    };
</script>
</body>
</html>
